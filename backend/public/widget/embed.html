<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chat with us</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --border: #24292f;
    --text: #e6edf3;
    --muted: #8b949e;
    --primary: #2563eb;
    --primary-fg: #ffffff;
    --me: #1f6feb;
    --them: #1d232a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel); display: flex; align-items: center; gap: 8px;
    font-weight: 600;
  }
  header .dot { width: 8px; height: 8px; border-radius: 999px; background: #22c55e; }
  main { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  #intro {
    display: flex; flex-direction: column; gap: 10px;
    padding: 16px; max-width: 360px; margin: auto; width: 100%;
  }
  #intro h2 { margin: 0; font-size: 16px; }
  #intro p { margin: 0; color: var(--muted); font-size: 13px; }
  #intro label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
  #intro input {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 14px;
  }
  #intro button {
    background: var(--primary); color: var(--primary-fg); border: 0;
    padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 4px;
  }
  #intro button:disabled { opacity: .5; cursor: not-allowed; }
  #chat { flex: 1; min-height: 0; display: none; flex-direction: column; }
  #chat.open { display: flex; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .msg { max-width: 80%; padding: 8px 10px; border-radius: 10px; font-size: 14px; line-height: 1.35; word-wrap: break-word; }
  .msg.me   { background: var(--me); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.them { background: var(--them); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.sys  { background: transparent; color: var(--muted); align-self: center; font-style: italic; font-size: 12px; }
  #form {
    display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); background: var(--panel);
  }
  #form input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 14px;
  }
  #form button {
    background: var(--primary); color: var(--primary-fg); border: 0;
    padding: 8px 14px; border-radius: 6px; font-size: 14px; cursor: pointer;
  }
  #form button:disabled { opacity: .5; cursor: not-allowed; }
  #error { color: #f87171; font-size: 12px; padding: 0 16px; }
</style>
</head>
<body>
<header><span class="dot"></span><span>Chat with our team</span></header>
<main>
  <section id="intro">
    <h2>Hi 👋 — how can we help?</h2>
    <p>Leave your name (and optionally an email or mobile) and we'll be right with you.</p>
    <label>Name <input id="f-name" type="text" placeholder="Your name" autocomplete="name" required /></label>
    <label>Email <input id="f-email" type="email" placeholder="optional" autocomplete="email" /></label>
    <label>Mobile <input id="f-mobile" type="tel" placeholder="optional, e.g. 919999999999" autocomplete="tel" /></label>
    <button id="f-start" type="button">Start chat</button>
    <div id="error"></div>
  </section>

  <section id="chat">
    <div id="messages"></div>
    <form id="form" autocomplete="off">
      <input id="f-body" type="text" placeholder="Type a message…" autocomplete="off" />
      <button type="submit" id="f-send">Send</button>
    </form>
  </section>
</main>

<script>
(function () {
  // Resolve API base — same origin since the page is served from the
  // backend. Operators iframing this widget from a different origin
  // should set window.SA_WIDGET_API_BASE before this script runs.
  var API = (window.SA_WIDGET_API_BASE || "") + "/api/widget/v1";
  var POLL_MS = 4000;

  var elIntro = document.getElementById("intro");
  var elChat = document.getElementById("chat");
  var elMsgs = document.getElementById("messages");
  var elForm = document.getElementById("form");
  var elBody = document.getElementById("f-body");
  var elSend = document.getElementById("f-send");
  var elStart = document.getElementById("f-start");
  var elName = document.getElementById("f-name");
  var elEmail = document.getElementById("f-email");
  var elMobile = document.getElementById("f-mobile");
  var elError = document.getElementById("error");

  var token = null;
  var sessionId = null;
  var lastTs = null;
  var pollTimer = null;
  var seen = new Set();

  function getUtm() {
    var q = new URLSearchParams(window.location.search);
    return {
      utmSource:   q.get("utm_source")   || undefined,
      utmMedium:   q.get("utm_medium")   || undefined,
      utmCampaign: q.get("utm_campaign") || undefined,
      adId:        q.get("ad_id") || q.get("adid") || undefined,
      landingPage: window.location.href.length <= 500 ? window.location.href : undefined,
      referrer:    document.referrer && document.referrer.length <= 500 ? document.referrer : undefined,
    };
  }

  function splitName(full) {
    var parts = (full || "").trim().split(/\s+/);
    if (parts.length <= 1) return { firstName: parts[0] || undefined };
    return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
  }

  function showError(msg) {
    elError.textContent = msg || "";
  }

  function append(m) {
    if (seen.has(m.id)) return;
    seen.add(m.id);
    var div = document.createElement("div");
    var cls = m.source === "SYSTEM" ? "sys" : (m.direction === "IN" ? "me" : "them");
    div.className = "msg " + cls;
    div.textContent = m.body;
    elMsgs.appendChild(div);
    elMsgs.scrollTop = elMsgs.scrollHeight;
    if (!lastTs || m.createdAt > lastTs) lastTs = m.createdAt;
  }

  async function startChat() {
    showError("");
    var name = elName.value.trim();
    if (!name) { showError("Name is required."); return; }
    elStart.disabled = true;
    try {
      var payload = Object.assign(splitName(name), getUtm(), {
        email: elEmail.value.trim() || undefined,
        mobile: elMobile.value.trim() || undefined,
        source: "web_chat",
      });
      var r = await fetch(API + "/start", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      var data = await r.json();
      if (!r.ok) throw new Error(data && data.error && data.error.message || "start failed");
      token = data.sessionToken;
      sessionId = data.sessionId;
      elIntro.style.display = "none";
      elChat.classList.add("open");
      append({ id: "sys-welcome", source: "SYSTEM", direction: "OUT", body: "Connected. We'll get back to you shortly.", createdAt: new Date().toISOString() });
      startPolling();
    } catch (err) {
      showError(err.message);
      elStart.disabled = false;
    }
  }

  async function send(e) {
    e.preventDefault();
    var body = elBody.value.trim();
    if (!body || !token) return;
    elSend.disabled = true;
    try {
      var r = await fetch(API + "/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ body: body }),
      });
      var data = await r.json();
      if (!r.ok) throw new Error(data && data.error && data.error.message || "send failed");
      elBody.value = "";
      append(data);
    } catch (err) {
      showError(err.message);
    } finally {
      elSend.disabled = false;
      elBody.focus();
    }
  }

  async function poll() {
    if (!token) return;
    try {
      var q = lastTs ? "?since=" + encodeURIComponent(lastTs) : "";
      var r = await fetch(API + "/messages" + q, {
        headers: { "Authorization": "Bearer " + token },
      });
      var data = await r.json();
      if (r.ok && data.items) {
        for (var i = 0; i < data.items.length; i++) append(data.items[i]);
      }
    } catch { /* network blip — try again next tick */ }
  }
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  elStart.addEventListener("click", startChat);
  elForm.addEventListener("submit", send);
})();
</script>
</body>
</html>
