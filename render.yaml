# Render.com blueprint for SalesAutomation
# Docs: https://render.com/docs/blueprint-spec
#
# Topology:
#   sa-api            Web service (Node)        — Express + Socket.io
#   sa-bullmq-worker  Background worker (Node)  — BullMQ queues + scheduler
#   sa-wa-worker      Background worker (Docker)— whatsapp-web.js + Chromium
#                                                  + 1 GB disk for session state
#   sa-postgres       Managed Postgres 16       — pgvector enabled by migration
#   sa-redis          Managed Key Value (Redis) — BullMQ requires noeviction
#
# Secrets to fill in via Render dashboard after first deploy
# (every key with `sync: false` below):
#   FRONTEND_URL        e.g. https://your-app.pages.dev
#   OPENAI_API_KEY      sk-...
#   GEMINI_API_KEY      (optional, leave blank to use OpenAI only)
#   SEED_ADMIN_EMAIL    e.g. you@example.com

databases:
  - name: sa-postgres
    plan: starter
    postgresMajorVersion: "16"
    # The first Prisma migration runs `CREATE EXTENSION IF NOT EXISTS "vector"`
    # so pgvector is enabled automatically on first deploy.

envVarGroups:
  - name: sa-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_EMBED_MODEL
        value: gemini-embedding-001
      - key: DEFAULT_TENANT_SLUG
        value: default
      - key: DEFAULT_TENANT_NAME
        value: Default Tenant
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false

services:
  # ─── Redis (BullMQ + caching) ──────────────────────────────────────────
  - type: keyvalue
    name: sa-redis
    plan: starter
    ipAllowList: []          # internal-only access from other Render services
    maxmemoryPolicy: noeviction   # required by BullMQ (jobs must not be evicted)

  # ─── API: Express + Socket.io ──────────────────────────────────────────
  - type: web
    name: sa-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - fromGroup: sa-shared
      - key: DATABASE_URL
        fromDatabase:
          name: sa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sa-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false           # set to your Cloudflare Pages URL

  # ─── BullMQ worker: KB embedding, scheduler, watchdog ──────────────────
  - type: worker
    name: sa-bullmq-worker
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/workers/index.js
    envVars:
      - fromGroup: sa-shared
      - key: DATABASE_URL
        fromDatabase:
          name: sa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sa-redis
          property: connectionString

  # ─── WhatsApp worker: whatsapp-web.js + Chromium ───────────────────────
  # Uses Docker because Render's native Node image lacks the system libs
  # Chromium needs (libnss3, libatk-bridge, etc).
  - type: worker
    name: sa-wa-worker
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile.wa-worker
    dockerContext: .
    disk:
      name: wwebjs-session
      mountPath: /app/.wwebjs_auth
      sizeGB: 1
    envVars:
      - fromGroup: sa-shared
      - key: DATABASE_URL
        fromDatabase:
          name: sa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sa-redis
          property: connectionString
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
