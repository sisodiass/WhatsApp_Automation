services:
  postgres:
    # Postgres 16 with pgvector extension preinstalled.
    image: pgvector/pgvector:pg16
    container_name: sa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: sa
      POSTGRES_DB: salesautomation
    ports:
      - "5432:5432"
    volumes:
      - sa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d salesautomation"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sa_pg_data:
  sa_redis_data:
